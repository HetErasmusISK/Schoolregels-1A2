<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klas 1A2 - Schoolregels</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Kleurenpalet (donker, professioneel) ── */
        :root {
            --bg:        #eef1f8;
            --bg-card:   #ffffff;
            --bg-input:  #f3f5fb;
            --border:    rgba(0,0,0,0.07);
            --text:      #1e2540;
            --text-muted:#7a85a3;
            --accent:    #3b6fd4;
            --accent-hover: #2d5bbf;

            --amber-bg:  #fff8e6; --amber-border: #fde9a2; --amber-text: #8a5a00;
            --rose-bg:   #fff0f2; --rose-border:  #fdc9d0; --rose-text:  #b01030;
            --indigo-bg: #eef0ff; --indigo-border:#c7cdf7; --indigo-text:#3730a3;
            --emerald-bg:#edfaf3; --emerald-border:#b6efd0; --emerald-text:#0a6640;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Header */
        .header { background: var(--bg-card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        .header-inner { max-width: 900px; margin: 0 auto; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .back-btn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text); }
        .back-btn:hover { background: rgba(0,0,0,0.06); }
        .header-title { font-size: 18px; font-weight: 600; color: var(--text); }
        .sync-status { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 4px; }
        .sync-time { font-size: 9px; color: var(--text-muted); margin-top: 2px; text-align: right; }

        /* Main */
        .main { max-width: 900px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }

        /* Student list */
        .student-card { background: var(--bg-card); padding: 14px 16px; border-radius: 16px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin-bottom: 10px; transition: border-color 0.15s, box-shadow 0.15s; }
        .student-card:hover { border-color: rgba(59,111,212,0.3); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        .student-card-left { display: flex; align-items: center; gap: 14px; }
        .status-bar { width: 4px; height: 48px; border-radius: 4px; flex-shrink: 0; }
        .student-name { font-size: 17px; font-weight: 600; color: var(--text); }
        .student-stats { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 4px; }
        .stat-item { font-size: 11px; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 3px; }
        .student-card-right { display: flex; align-items: center; gap: 8px; }
        .delete-btn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 8px; color: var(--text-muted); transition: color 0.15s; display: flex; }
        .delete-btn:hover { color: var(--rose-text); }
        .chevron { color: var(--text-muted); }

        /* Empty state */
        .empty { text-align: center; padding: 80px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }

        /* Add student */
        .add-section { margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border); }
        .add-form { background: var(--bg-card); padding: 12px; border-radius: 16px; border: 1px solid var(--border); display: flex; gap: 8px; margin-bottom: 12px; }
        .add-form input { flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; font-size: 14px; outline: none; font-family: inherit; color: var(--text); }
        .add-form input:focus { border-color: var(--accent); }
        .btn { border: none; border-radius: 16px; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: background 0.15s, transform 0.1s; font-family: inherit; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-ghost { background: rgba(0,0,0,0.05); color: var(--text-muted); padding: 8px 14px; }
        .btn-ghost:hover { background: rgba(0,0,0,0.09); }
        .btn-icon { border-radius: 16px; padding: 12px 16px; }
        .action-row { display: flex; flex-wrap: wrap; gap: 10px; }
        .action-row .btn-primary { flex: 1; justify-content: center; min-width: 160px; }

        /* Detail view */
        .section { background: var(--bg-card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 16px; }
        .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 14px; }

        /* Record actions grid */
        .actions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 600px) { .actions-grid { grid-template-columns: repeat(4, 1fr); } }
        .action-btn { border: 1px solid; border-radius: 16px; padding: 14px; cursor: pointer; transition: filter 0.15s, transform 0.1s; display: flex; flex-direction: column; align-items: center; gap: 6px; font-family: inherit; }
        .action-btn:hover { filter: brightness(1.15); }
        .action-btn:active { transform: scale(0.96); }
        .action-btn span { font-size: 13px; font-weight: 600; }
        .action-btn.amber  { background: var(--amber-bg);   border-color: var(--amber-border);   color: var(--amber-text); }
        .action-btn.rose   { background: var(--rose-bg);    border-color: var(--rose-border);    color: var(--rose-text); }
        .action-btn.indigo { background: var(--indigo-bg);  border-color: var(--indigo-border);  color: var(--indigo-text); }
        .action-btn.emerald{ background: var(--emerald-bg); border-color: var(--emerald-border); color: var(--emerald-text); }
        .date-note-toggle { font-size: 10px; color: var(--text-muted); cursor: pointer; background: none; border: none; font-family: inherit; margin-top: 2px; display: flex; align-items: center; gap: 3px; }
        .date-note-toggle:hover { color: var(--text); }
        .date-note-form { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
        .date-note-form label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
        .date-note-form input { border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 12px; background: var(--bg-input); color: var(--text); outline: none; font-family: inherit; }
        .date-note-form input:focus { border-color: var(--accent); }
        .action-wrapper { display: flex; flex-direction: column; gap: 4px; align-items: stretch; }

        /* Supplies */
        .supplies-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
        @media (min-width: 500px) { .supplies-grid { grid-template-columns: repeat(3, 1fr); } }
        .supply-btn { border-radius: 12px; padding: 10px; cursor: pointer; border: 1px solid; transition: filter 0.15s; display: flex; flex-direction: column; align-items: center; gap: 6px; font-family: inherit; }
        .supply-btn:hover { filter: brightness(1.12); }
        .supply-btn.has     { background: var(--emerald-bg); border-color: var(--emerald-border); color: var(--emerald-text); }
        .supply-btn.missing { background: var(--rose-bg);    border-color: var(--rose-border);    color: var(--rose-text); }
        .supply-btn-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .supply-name { font-size: 10px; font-weight: 700; }
        .supply-emoji { font-size: 36px; line-height: 1; }

        /* Status cards */
        .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 600px) { .status-grid { grid-template-columns: repeat(4, 1fr); } }
        .status-card { padding: 16px; border-radius: 24px; border: 1px solid; }
        .status-card.green  { background: var(--emerald-bg); border-color: var(--emerald-border); color: var(--emerald-text); }
        .status-card.orange { background: var(--amber-bg);   border-color: var(--amber-border);   color: var(--amber-text); }
        .status-card.red    { background: var(--rose-bg);    border-color: var(--rose-border);    color: var(--rose-text); }
        .status-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .status-card-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.6; }
        .status-card-count { font-size: 24px; font-weight: 900; }
        .status-card-label { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
        .status-card-measures { font-size: 11px; opacity: 0.75; padding-left: 14px; }
        .status-card-measures li { margin-bottom: 2px; }

        /* History */
        .history-item { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .history-item:last-child { border-bottom: none; }
        .history-item:hover { background: #f5f7fd; }
        .history-left { display: flex; align-items: center; gap: 12px; }
        .history-icon { padding: 8px; border-radius: 10px; display: flex; }
        .history-type { font-size: 14px; font-weight: 500; text-transform: capitalize; color: var(--text); }
        .history-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .history-note { font-size: 11px; color: #3b6fd4; font-style: italic; margin-top: 2px; }
        .history-forgotten { font-size: 11px; color: #b01030; font-weight: 500; margin-top: 2px; }

        /* SVG icons */
        svg { display: inline-block; vertical-align: middle; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="app"></div>

<script>
// ===================== STATE =====================
const JSONBIN_API_KEY = "$2a$10$RLtKp3BpaiUi6TqRsnW.3.C3zkJfGzSWGwFXg2GOrjBbwGMJpcjf6";
const JSONBIN_BIN_ID = "69ba996dc3097a1dd537643f";
const STORAGE_KEY = 'sut_tracker_students';
const SUPPLY_ITEMS = ['TAS', 'ETUI', 'PEN', 'POTLOOD', 'GUM', 'OORTJES'];
const ITEM_IMAGES = {
    TAS:    '🎒',
    ETUI:   '🗃️',
    PEN:    '🖊️',
    POTLOOD:'✏️',
    GUM:    '🧽',
    OORTJES:'🎧',
};

let state = {
    students: [],
    selectedId: null,
    isAdding: false,
    newName: '',
    isSyncing: false,
    syncError: null,
    lastSync: null,
    supplies: Object.fromEntries(SUPPLY_ITEMS.map(i => [i, true])),
    dateNoteOpen: {},   // recordType -> bool
    dateValues: {},     // recordType -> date string
    noteValues: {},     // recordType -> note string
};

// ===================== PROTOCOL =====================
function getTeLaatStatus(n) {
    if (n < 3)  return { color:'green',  label:'Geen actie nodig', measures:[] };
    if (n < 7)  return { color:'orange', label:'Waarschuwing (3-6 keer)', measures:['Gesprek tijdens coachmoment','Contact thuis','Dagstart 2 dagen'] };
    if (n < 10) return { color:'red',    label:'Zorgelijk (7-9 keer)', measures:['Gesprek tijdens coachmoment','Contact thuis','Dagstart 3 dagen','Aanmelding preventief leerplichtspreekuur'] };
    return { color:'red', label:'Kritiek (10+ keer)', measures:['Gesprek ouders op school','Dagstart 5 dagen','Melding DUO'] };
}
function getSpijbelStatus(n) {
    if (n === 0) return { color:'green',  label:'Geen actie nodig', measures:[] };
    if (n < 5)   return { color:'orange', label:'Waarschuwing (1-4 lesuren)', measures:['Gesprek tijdens coachmoment','Contact thuis'] };
    if (n < 10)  return { color:'red',    label:'Zorgelijk (5-9 lesuren)', measures:['Gesprek met ouders op school','Dagstart 2 dagen','Aanmelding preventief leerplichtspreekuur'] };
    return { color:'red', label:'Kritiek (10+ lesuren)', measures:['Gesprek ouders op school','Aanvullende maatregelen','Melding DUO'] };
}
function getUitgestuurdStatus(n) {
    if (n === 0) return { color:'green',  label:'Geen actie nodig', measures:[] };
    if (n < 5)   return { color:'orange', label:'Waarschuwing (1-4 keer)', measures:['Werken op de gang','Contact thuis door docent','Gesprek tijdens coachmoment'] };
    if (n < 6)   return { color:'red',    label:'Zorgelijk (5 keer)', measures:['Werken op de gang','Contact thuis door docent','Gesprek ouders op school'] };
    return { color:'red', label:'Kritiek (6+ keer)', measures:['Aanvullende afspraken','Gesprek ouders op school'] };
}
function getTelefoonStatus(n) {
    if (n === 0) return { color:'green',  label:'Geen actie nodig', measures:[] };
    if (n === 1) return { color:'orange', label:'Stap 1 (1e keer)', measures:['Inleveren bij administratie','Ophalen om 16:00 uur','Aantekening in Magister'] };
    if (n === 2) return { color:'red',    label:'Stap 2 (2e keer / Weigering)', measures:['Ouders bellen','Intern schorsen','Volgende dag inleveren voor 1e les','Ophalen 16:00-16:15 uur'] };
    return { color:'red', label:'Stap 3 (3+ keer)', measures:['Mentor neemt contact op met ouders','Gedragsovereenkomst opstellen','Ondertekening door leerling, ouders en school'] };
}

// ===================== ICONS (inline SVG) =====================
const ICONS = {
    Clock:         '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
    AlertTriangle: '<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
    LogOut:        '<path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
    Smartphone:    '<rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>',
    Package:       '<line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>',
    ChevronRight:  '<polyline points="9 18 15 12 9 6"/>',
    ArrowLeft:     '<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>',
    Trash2:        '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>',
    Plus:          '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
    Download:      '<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
    Upload:        '<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
    RefreshCw:     '<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>',
    Cloud:         '<path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/>',
    CloudOff:      '<path d="M22.61 16.95A5 5 0 0018 10h-1.26A8 8 0 005 5.07M5 5L1 1l22 22"/><path d="M22 17.66A5 5 0 0017.66 22M9.73 9.73A8 8 0 0020.27 20.27"/>',
    Calendar:      '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
    UserX:         '<path d="M16 11a4 4 0 10-8 0 4 4 0 008 0z"/><path d="M3 21v-1a8 8 0 0111.35-7.23"/><line x1="17" y1="17" x2="22" y2="22"/><line x1="22" y1="17" x2="17" y2="22"/>',
    CheckSquare:   '<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>',
    Square:        '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>',
};

function icon(name, size=20, color='currentColor') {
    const inner = ICONS[name] || '';
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
}

// ===================== DATA =====================
function uid() { return Math.random().toString(36).substr(2, 9); }
function today() { return new Date().toISOString().split('T')[0]; }

function loadLocal() {
    try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : []; }
    catch { return []; }
}
function saveLocal(students) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(students)); } catch {}
}

let syncTimeout = null;
function scheduleSync() {
    clearTimeout(syncTimeout);
    syncTimeout = setTimeout(syncToCloud, 2000);
}
async function syncToCloud() {
    state.isSyncing = true; render();
    try {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
            body: JSON.stringify(state.students)
        });
        if (!r.ok) throw new Error('save failed');
        state.lastSync = new Date(); state.syncError = null;
    } catch { state.syncError = 'Kon niet opslaan in cloud.'; }
    state.isSyncing = false; render();
}
async function loadFromCloud() {
    state.isSyncing = true; render();
    try {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
            headers: { 'X-Master-Key': JSONBIN_API_KEY }
        });
        if (!r.ok) throw new Error('fetch failed');
        const data = await r.json();
        if (Array.isArray(data.record)) {
            state.students = data.record;
            saveLocal(state.students);
            state.lastSync = new Date(); state.syncError = null;
        }
    } catch { state.syncError = 'Offline: lokale data gebruikt.'; }
    state.isSyncing = false; render();
}

// ===================== ACTIONS =====================
function addStudent() {
    const name = state.newName.trim();
    if (!name) return;
    state.students.push({ id: uid(), name, records: [] });
    state.newName = ''; state.isAdding = false;
    saveLocal(state.students); scheduleSync(); render();
}
function removeStudent(id) {
    if (!confirm('Leerling verwijderen?')) return;
    state.students = state.students.filter(s => s.id !== id);
    if (state.selectedId === id) state.selectedId = null;
    saveLocal(state.students); scheduleSync(); render();
}
function addRecord(studentId, type, date, forgottenItems, note) {
    const s = state.students.find(s => s.id === studentId);
    if (!s) return;
    s.records.push({ id: uid(), type, date: date || today(), forgottenItems, note });
    saveLocal(state.students); scheduleSync(); render();
}
function removeRecord(studentId, recordId) {
    const s = state.students.find(s => s.id === studentId);
    if (!s) return;
    s.records = s.records.filter(r => r.id !== recordId);
    saveLocal(state.students); scheduleSync(); render();
}
function handleSuppliesRegister(date, note) {
    const forgotten = SUPPLY_ITEMS.filter(i => !state.supplies[i]);
    addRecord(state.selectedId, 'vergeten-spullen', date, forgotten, note);
    state.supplies = Object.fromEntries(SUPPLY_ITEMS.map(i => [i, true]));
}

function exportData() {
    const a = document.createElement('a');
    a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(state.students, null, 2));
    a.download = `sut_export_${today()}.json`;
    a.click();
}
function importData(e) {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data)) { alert('Ongeldig bestand'); return; }
            if (!confirm('Huidige lijst vervangen?')) return;
            state.students = data; saveLocal(state.students); scheduleSync(); render();
        } catch { alert('Fout bij laden'); }
    };
    reader.readAsText(file);
    e.target.value = '';
}

// ===================== RENDER =====================
function render() {
    document.getElementById('app').innerHTML = buildApp();
    attachEvents();
}

function buildApp() {
    const student = state.students.find(s => s.id === state.selectedId);
    return `
    <div class="header">
      <div class="header-inner">
        <div class="header-left">
          ${student ? `<button class="back-btn" id="btn-back">${icon('ArrowLeft', 20)}</button>` : ''}
          <span class="header-title">${student ? escHtml(student.name) : 'Klas 1A2 – Schoolregels'}</span>
        </div>
        <div>
          <div class="sync-status" style="color:${state.isSyncing ? '#3b82f6' : state.syncError ? '#f43f5e' : '#10b981'}">
            ${icon(state.isSyncing ? 'RefreshCw' : state.syncError ? 'CloudOff' : 'Cloud', 12)}
            ${state.isSyncing ? 'Sync...' : state.syncError ? 'Offline' : 'Cloud'}
          </div>
          ${state.lastSync && !state.syncError ? `<div class="sync-time">${state.lastSync.toLocaleTimeString('nl-NL')}</div>` : ''}
        </div>
      </div>
    </div>
    <div class="main">
      ${student ? buildDetail(student) : buildList()}
    </div>`;
}

function buildList() {
    const sorted = [...state.students].sort((a,b) => a.name.localeCompare(b.name, 'nl'));
    return `
    ${sorted.length === 0 ? `<div class="empty"><div class="empty-icon">${icon('UserX', 48)}</div><p>Nog geen leerlingen toegevoegd.</p></div>` :
        sorted.map(s => {
            const tl = s.records.filter(r=>r.type==='te-laat').length;
            const sp = s.records.filter(r=>r.type==='spijbelen').length;
            const ui = s.records.filter(r=>r.type==='uitgestuurd').length;
            const te = s.records.filter(r=>r.type==='telefoon-ingenomen').length;
            const vg = s.records.filter(r=>r.type==='vergeten-spullen').reduce((a,r)=>a+(r.forgottenItems?.length||0),0);
            const statuses = [getTeLaatStatus(tl).color, getSpijbelStatus(sp).color, getUitgestuurdStatus(ui).color, getTelefoonStatus(te).color];
            const col = statuses.includes('red') ? '#e63560' : statuses.includes('orange') ? '#d97706' : '#059669';
            return `<div class="student-card" data-student-id="${s.id}">
              <div class="student-card-left">
                <div class="status-bar" style="background:${col}"></div>
                <div>
                  <div class="student-name">${escHtml(s.name)}</div>
                  <div class="student-stats">
                    <span class="stat-item">${icon('Clock',12)} ${tl}× te laat</span>
                    <span class="stat-item">${icon('AlertTriangle',12)} ${sp}× spijbel</span>
                    <span class="stat-item">${icon('LogOut',12)} ${ui}× uitgestuurd</span>
                    <span class="stat-item">${icon('Smartphone',12)} ${te}× telefoon</span>
                    <span class="stat-item">${icon('Package',12)} ${vg}× spullen vergeten</span>
                  </div>
                </div>
              </div>
              <div class="student-card-right">
                <button class="delete-btn" data-delete-id="${s.id}">${icon('Trash2',18)}</button>
                <span class="chevron">${icon('ChevronRight',20)}</span>
              </div>
            </div>`;
        }).join('')
    }
    <div class="add-section">
      ${state.isAdding ? `
        <div class="add-form">
          <input id="new-student-input" type="text" placeholder="Naam leerling..." value="${escAttr(state.newName)}" />
          <button class="btn btn-primary" id="btn-add-confirm">Toevoegen</button>
          <button class="btn btn-ghost" id="btn-add-cancel">Annuleren</button>
        </div>` : `
        <div class="action-row">
          <button class="btn btn-primary" id="btn-add-start">${icon('Plus',20)} Leerling Toevoegen</button>
          <button class="btn btn-primary btn-icon" id="btn-export">${icon('Download',20)} Export</button>
          <button class="btn btn-primary btn-icon" id="btn-import-trigger">${icon('Upload',20)} Import</button>
          <input type="file" id="import-input" accept=".json" style="display:none" />
        </div>`}
    </div>`;
}

function buildActionWidget(key, title, colorClass, recordType) {
    const isOpen = state.dateNoteOpen[key];
    const dateVal = state.dateValues[key] || today();
    const noteVal = state.noteValues[key] || '';
    const iconMap = { te_laat:'Clock', spijbelen:'AlertTriangle', uitgestuurd:'LogOut', telefoon:'Smartphone', spullen:'Package' };
    const iconName = iconMap[key] || 'Clock';
    return `<div class="action-wrapper">
      <button class="action-btn ${colorClass}" data-action="${key}">
        ${icon(iconName, 22)}
        <span>${title}</span>
      </button>
      <button class="date-note-toggle" data-toggle="${key}">
        ${icon('Calendar',10)} ${dateVal === today() ? 'Vandaag' : dateVal}${noteVal ? ' • Met notitie' : ' • Gegevens aanpassen'}
      </button>
      ${isOpen ? `<div class="date-note-form">
        <label>Datum</label>
        <input type="date" data-date-key="${key}" value="${dateVal}" />
        <label>Notitie (optioneel)</label>
        <input type="text" data-note-key="${key}" placeholder="Bijv. 'Was 5 min te laat'" value="${escAttr(noteVal)}" />
      </div>` : ''}
    </div>`;
}

function buildDetail(student) {
    const tl = student.records.filter(r=>r.type==='te-laat').length;
    const sp = student.records.filter(r=>r.type==='spijbelen').length;
    const ui = student.records.filter(r=>r.type==='uitgestuurd').length;
    const te = student.records.filter(r=>r.type==='telefoon-ingenomen').length;

    const sorted = [...student.records].sort((a,b) => b.date.localeCompare(a.date));

    return `
    <div class="section">
      <div class="section-title">SUT Protocol Registreren</div>
      <div class="actions-grid">
        ${buildActionWidget('te_laat','Te Laat','amber','te-laat')}
        ${buildActionWidget('spijbelen','Spijbelen','rose','spijbelen')}
        ${buildActionWidget('uitgestuurd','Uitgestuurd','indigo','uitgestuurd')}
        ${buildActionWidget('telefoon','Telefoon','rose','telefoon-ingenomen')}
      </div>
    </div>

    <div class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="section-title" style="margin-bottom:0">Spullen Check</div>
        <div style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px">
          ${icon('Package',14)} ${SUPPLY_ITEMS.filter(i=>!state.supplies[i]).length} vergeten
        </div>
      </div>
      <div class="supplies-grid">
        ${SUPPLY_ITEMS.map(item => `
          <button class="supply-btn ${state.supplies[item]?'has':'missing'}" data-supply="${item}">
            <div class="supply-btn-top">
              ${state.supplies[item] ? icon('CheckSquare',16) : icon('Square',16)}
              <span class="supply-name">${item}</span>
            </div>
            <span style="font-size:36px;line-height:1">${ITEM_IMAGES[item]}</span>
          </button>`).join('')}
      </div>
      <div class="supply-register">
        ${buildActionWidget('spullen','Registreer Spullen','emerald','vergeten-spullen')}
      </div>
    </div>

    <div class="status-grid" style="margin-bottom:16px">
      ${buildStatusCard('Te Laat', tl, getTeLaatStatus(tl))}
      ${buildStatusCard('Spijbelen', sp, getSpijbelStatus(sp))}
      ${buildStatusCard('Uitgestuurd', ui, getUitgestuurdStatus(ui))}
      ${buildStatusCard('Telefoon', te, getTelefoonStatus(te))}
    </div>

    <div class="section" style="padding:0;overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border)"><div class="section-title" style="margin-bottom:0">Geschiedenis</div></div>
      ${sorted.length === 0
        ? '<div style="padding:40px;text-align:center;color:var(--text-muted)">Nog geen registraties.</div>'
        : sorted.map(r => {
            const typeLabel = r.type.replace(/-/g,' ');
            const iconName = r.type==='te-laat'?'Clock':r.type==='spijbelen'?'AlertTriangle':r.type==='uitgestuurd'?'LogOut':r.type==='telefoon-ingenomen'?'Smartphone':'Package';
            const bgColor = r.type==='te-laat'?'#fff8e6':r.type==='uitgestuurd'?'#eef0ff':r.type==='vergeten-spullen'?'#edfaf3':'#fff0f2';
            const fgColor = r.type==='te-laat'?'#8a5a00':r.type==='uitgestuurd'?'#3730a3':r.type==='vergeten-spullen'?'#0a6640':'#b01030';
            const dateStr = new Date(r.date+'T12:00:00').toLocaleDateString('nl-NL', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
            return `<div class="history-item">
              <div class="history-left">
                <div class="history-icon" style="background:${bgColor};color:${fgColor}">${icon(iconName,18,fgColor)}</div>
                <div>
                  <div class="history-type">${typeLabel}</div>
                  <div class="history-date">${dateStr}</div>
                  ${r.note ? `<div class="history-note">"${escHtml(r.note)}"</div>` : ''}
                  ${r.forgottenItems?.length ? `<div class="history-forgotten">Vergeten: ${r.forgottenItems.join(', ')}</div>` : ''}
                </div>
              </div>
              <button class="delete-btn" data-delete-record="${r.id}">${icon('Trash2',16)}</button>
            </div>`;
          }).join('')
      }
    </div>`;
}

function buildStatusCard(title, count, status) {
    return `<div class="status-card ${status.color}">
      <div class="status-card-header">
        <div class="status-card-name">${title}</div>
        <div class="status-card-count">${count}</div>
      </div>
      <div class="status-card-label">${status.label}</div>
      ${status.measures.length ? `<ul class="status-card-measures">${status.measures.map(m=>`<li>${m}</li>`).join('')}</ul>` : ''}
    </div>`;
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s||'').replace(/"/g,'&quot;'); }

// ===================== EVENTS =====================
function attachEvents() {
    // Back
    document.getElementById('btn-back')?.addEventListener('click', () => { state.selectedId = null; render(); });

    // Student select
    document.querySelectorAll('.student-card').forEach(el => {
        el.addEventListener('click', e => {
            if (e.target.closest('[data-delete-id]')) return;
            state.selectedId = el.dataset.studentId; render();
        });
    });

    // Delete student
    document.querySelectorAll('[data-delete-id]').forEach(btn => {
        btn.addEventListener('click', e => { e.stopPropagation(); removeStudent(btn.dataset.deleteId); });
    });

    // Delete record
    document.querySelectorAll('[data-delete-record]').forEach(btn => {
        btn.addEventListener('click', () => removeRecord(state.selectedId, btn.dataset.deleteRecord));
    });

    // Add student
    document.getElementById('btn-add-start')?.addEventListener('click', () => { state.isAdding = true; render(); setTimeout(()=>document.getElementById('new-student-input')?.focus(),50); });
    document.getElementById('btn-add-cancel')?.addEventListener('click', () => { state.isAdding = false; render(); });
    document.getElementById('btn-add-confirm')?.addEventListener('click', addStudent);
    document.getElementById('new-student-input')?.addEventListener('input', e => { state.newName = e.target.value; });
    document.getElementById('new-student-input')?.addEventListener('keydown', e => { if (e.key==='Enter') addStudent(); });

    // Export/import
    document.getElementById('btn-export')?.addEventListener('click', exportData);
    document.getElementById('btn-import-trigger')?.addEventListener('click', () => document.getElementById('import-input').click());
    document.getElementById('import-input')?.addEventListener('change', importData);

    // Action buttons (SUT registreren)
    const actionMap = { te_laat:'te-laat', spijbelen:'spijbelen', uitgestuurd:'uitgestuurd', telefoon:'telefoon-ingenomen', spullen:'vergeten-spullen' };
    document.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
            const key = btn.dataset.action;
            const date = state.dateValues[key] || today();
            const note = state.noteValues[key] || '';
            if (key === 'spullen') handleSuppliesRegister(date, note);
            else addRecord(state.selectedId, actionMap[key], date, undefined, note);
            state.dateNoteOpen[key] = false;
            state.dateValues[key] = today();
            state.noteValues[key] = '';
        });
    });

    // Toggle date/note panels
    document.querySelectorAll('[data-toggle]').forEach(btn => {
        btn.addEventListener('click', () => {
            const key = btn.dataset.toggle;
            state.dateNoteOpen[key] = !state.dateNoteOpen[key];
            render();
        });
    });

    // Date/note inputs
    document.querySelectorAll('[data-date-key]').forEach(inp => {
        inp.addEventListener('change', e => { state.dateValues[inp.dataset.dateKey] = e.target.value; render(); });
    });
    document.querySelectorAll('[data-note-key]').forEach(inp => {
        inp.addEventListener('input', e => { state.noteValues[inp.dataset.noteKey] = e.target.value; });
    });

    // Supplies
    document.querySelectorAll('[data-supply]').forEach(btn => {
        btn.addEventListener('click', () => {
            const item = btn.dataset.supply;
            state.supplies[item] = !state.supplies[item];
            render();
        });
    });
}

// ===================== INIT =====================
state.students = loadLocal();
render();
loadFromCloud();
</script>
